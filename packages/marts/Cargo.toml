[package]
name = "marts"
description = "marts = mize_parts - parts collection of the Mize framework"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5.59", optional = true }
deno_core = { version = "0.385.0", optional = true }
mize = { path = "../mize/", default-features = false }

[features]
default = ["target-os"]
target-os = [ "clap", "mize/target-os" ]
target-wasm = [ "mize/target-wasm" ]

[lib]
path = "lib.rs"
